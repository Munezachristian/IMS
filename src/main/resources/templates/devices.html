<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Devices - Airtel Inventory</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Device Management</h1>
        
        <nav class="nav-menu">
            <a href="/">Dashboard</a>
            <a href="/devices">Devices</a>
            <a href="/employees">Employees</a>
            <a href="/assignments">Assignments</a>
            <a href="/issues">Issues</a>
            <a href="/reports">Reports</a>
            <a href="/logout" style="background: #dc3545;">Logout</a>
        </nav>

        <div class="toolbar">
            <button class="btn-primary" onclick="showAddForm()">Add Device</button>
            <button class="btn-secondary" onclick="loadDevices()">Refresh</button>
            <input type="text" id="searchInput" placeholder="Search by serial number..." onkeyup="searchDevices()">
        </div>

        <!-- Add Device Form -->
        <div id="addForm" class="form-modal" style="display:none">
            <div class="form-content">
                <h3>Add New Device</h3>
                <input type="text" id="serialNumber" placeholder="Serial Number" required>
                <select id="deviceType">
                    <option value="LAPTOP">LAPTOP</option>
                    <option value="DESKTOP">DESKTOP</option>
                    <option value="MOBILE">MOBILE</option>
                </select>
                <input type="text" id="brand" placeholder="Brand">
                <input type="text" id="model" placeholder="Model">
                <textarea id="specifications" placeholder="Specifications"></textarea>
                <select id="status">
                    <option value="AVAILABLE">AVAILABLE</option>
                    <option value="ASSIGNED">ASSIGNED</option>
                    <option value="UNDER_MAINTENANCE">UNDER MAINTENANCE</option>
                    <option value="LOST">LOST</option>
                    <option value="RETIRED">RETIRED</option>
                </select>
                <div class="form-buttons">
                    <button class="btn-primary" onclick="saveDevice()">Save</button>
                    <button class="btn-secondary" onclick="closeAddForm()">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Edit Device Form -->
        <div id="editForm" class="form-modal" style="display:none">
            <div class="form-content">
                <h3>Edit Device</h3>
                <input type="hidden" id="editId">
                <input type="text" id="editSerialNumber" placeholder="Serial Number" readonly>
                <select id="editDeviceType">
                    <option value="LAPTOP">LAPTOP</option>
                    <option value="DESKTOP">DESKTOP</option>
                    <option value="MOBILE">MOBILE</option>
                </select>
                <input type="text" id="editBrand" placeholder="Brand">
                <input type="text" id="editModel" placeholder="Model">
                <textarea id="editSpecifications" placeholder="Specifications"></textarea>
                <select id="editStatus">
                    <option value="AVAILABLE">AVAILABLE</option>
                    <option value="ASSIGNED">ASSIGNED</option>
                    <option value="UNDER_MAINTENANCE">UNDER MAINTENANCE</option>
                    <option value="LOST">LOST</option>
                    <option value="RETIRED">RETIRED</option>
                </select>
                <div class="form-buttons">
                    <button class="btn-primary" onclick="updateDevice()">Update</button>
                    <button class="btn-secondary" onclick="closeEditForm()">Cancel</button>
                </div>
            </div>
        </div>

        <table id="devicesTable">
            <thead>
                <tr><th>ID</th><th>Serial Number</th><th>Type</th><th>Brand</th><th>Model</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let allDevices = [];

        function loadDevices() {
            fetch('/api/devices')
                .then(r => r.json())
                .then(devices => {
                    allDevices = devices;
                    displayDevices(devices);
                });
        }

        function displayDevices(devices) {
            const tbody = document.querySelector('#devicesTable tbody');
            tbody.innerHTML = '';
            devices.forEach(device => {
                const statusClass = getStatusClass(device.currentStatus);
                tbody.innerHTML += `
                    <tr>
                        <td>${device.id}</td>
                        <td>${device.serialNumber}</td>
                        <td>${device.deviceType}</td>
                        <td>${device.brand}</td>
                        <td>${device.model}</td>
                        <td><span class="status-badge ${statusClass}">${device.currentStatus}</span></td>
                        <td>
                            <button class="btn-edit" onclick="editDevice(${device.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteDevice(${device.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        function getStatusClass(status) {
            switch(status) {
                case 'AVAILABLE': return 'status-available';
                case 'ASSIGNED': return 'status-assigned';
                case 'UNDER_MAINTENANCE': return 'status-maintenance';
                default: return '';
            }
        }

        function showAddForm() { document.getElementById('addForm').style.display = 'flex'; }
        function closeAddForm() { document.getElementById('addForm').style.display = 'none'; }
        function closeEditForm() { document.getElementById('editForm').style.display = 'none'; }

        function saveDevice() {
            const device = {
                serialNumber: document.getElementById('serialNumber').value,
                deviceType: document.getElementById('deviceType').value,
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                specifications: document.getElementById('specifications').value,
                currentStatus: document.getElementById('status').value
            };
            fetch('/api/devices', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(device)
            }).then(() => {
                loadDevices();
                closeAddForm();
                clearAddForm();
            }).catch(err => alert('Error: ' + err));
        }

        function editDevice(id) {
            fetch(`/api/devices/${id}`)
                .then(r => r.json())
                .then(device => {
                    document.getElementById('editId').value = device.id;
                    document.getElementById('editSerialNumber').value = device.serialNumber;
                    document.getElementById('editDeviceType').value = device.deviceType;
                    document.getElementById('editBrand').value = device.brand;
                    document.getElementById('editModel').value = device.model;
                    document.getElementById('editSpecifications').value = device.specifications || '';
                    document.getElementById('editStatus').value = device.currentStatus;
                    document.getElementById('editForm').style.display = 'flex';
                });
        }

        function updateDevice() {
            const id = document.getElementById('editId').value;
            const device = {
                serialNumber: document.getElementById('editSerialNumber').value,
                deviceType: document.getElementById('editDeviceType').value,
                brand: document.getElementById('editBrand').value,
                model: document.getElementById('editModel').value,
                specifications: document.getElementById('editSpecifications').value,
                currentStatus: document.getElementById('editStatus').value
            };
            fetch(`/api/devices/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(device)
            }).then(() => {
                loadDevices();
                closeEditForm();
            }).catch(err => alert('Error: ' + err));
        }

        function deleteDevice(id) {
            if(confirm('Are you sure you want to delete this device?')) {
                fetch(`/api/devices/${id}`, {method: 'DELETE'})
                    .then(() => loadDevices())
                    .catch(err => alert('Error: ' + err));
            }
        }

        function searchDevices() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allDevices.filter(d => d.serialNumber.toLowerCase().includes(search));
            displayDevices(filtered);
        }

        function clearAddForm() {
            document.getElementById('serialNumber').value = '';
            document.getElementById('brand').value = '';
            document.getElementById('model').value = '';
            document.getElementById('specifications').value = '';
        }

        loadDevices();
    </script>
</body>
</html>
