<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Airtel Inventory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            min-width: 350px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .login-container h2 { color: #1a73e8; margin-bottom: 10px; }
        .login-container h3 { color: #666; margin-bottom: 20px; }
        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .login-container button:hover { background: #0d47a1; }
        .error-message { color: red; margin-top: 10px; }
        .credential-info {
            margin-top: 20px;
            padding: 10px;
            background: #f0f2f5;
            border-radius: 8px;
            font-size: 12px;
        }
        .developer-info {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Airtel Inventory System</h2>
        <h3>Login to Continue</h3>
        
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        
        <div th:if="${param.error}" class="error-message">
            Invalid username or password
        </div>
        
        <div class="credential-info">
            <p><strong>Group GA6 - SysAdmin Credentials:</strong></p>
            <p>Username: 24RP12634<br>Password: 24RP03282</p>
        </div>
        
        <div class="developer-info">
            <p>Developed by: Christian MUNEZA (24RP12634) & Marie Belyse NIYITANGA (24RP03282)</p>
            <p>Airtel Inventory Management System © 2026</p>
        </div>
    </div>
</body>
</html>
